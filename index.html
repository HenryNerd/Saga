<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="style/index.css">
    <title>Saga - Sign In</title>
</head>

<body>
    <div class="card">
        <div class="login">
            <h1>Saga</h1>
            <h2>Test Site</h2>
            <form id="login">
                <label for="userid">User ID:</label><br>
                <input class="text" type="text" id="userid" name="userid"><br>
                <label for="password">Pin:</label><br>
                <input class="text" type="password" id="password" name="password"><br>
                <input type="submit" value="Log In">
            </form>

            <script>
                const form = document.getElementById('login');
                form.addEventListener('submit', function (event) {
                    event.preventDefault();
                    const numberValue = document.getElementById('userid').value;
                    localStorage.setItem('userid', numberValue);
                    window.location.href = 'user.html';
                });
            </script>

            <h6>Saga Version: v0.0.1 | Build: Development | Language: EN</h6>
        </div>
    </div>
    <script>
    const userId = localStorage.getItem('userid');
    if (userId) {
        window.location.href = "user.html";
    }
</script>
</body>

</html>
